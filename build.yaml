builders:
  ql_gen_builder:
    import: "package:ql_gen/builder.dart"
    builder_factories: [ "qlGenBuilder" ]
    build_extensions:
      {
        ".graphql": [ ".gql.dart" ],
        ".graphqls": [ ".gql.dart" ],
        ".gql": [ ".gql.dart" ],
      }
    auto_apply: dependents
    build_to: source
    # Optional configuration:
    # options:
    #   schema_path: lib/schema/schema.gql   # Custom schema file path
    #   output_path: lib/generated/           # Custom output directory or file path
