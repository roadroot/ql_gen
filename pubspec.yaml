name: ql_gen
description: Generate strongly typed Dart GraphQL client helpers from schema
  files, including models, selectors, and operation builders for queries and
  mutations.
version: 0.1.8
repository: https://github.com/roadroot/ql_gen

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  args: ^2.7.0
  build: ^4.0.6
  path: ^1.9.0
  tokenizer_parser: ^0.1.2

dev_dependencies:
  lints: ^6.0.0
  test: ^1.31.1
